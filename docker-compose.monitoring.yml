version: '3.8'

services:
  # ========================
  # Prometheus - Metrics
  # ========================
  apexp-prometheus:
    image: prom/prometheus:latest
    ports:
      - ":9090"
    volumes:
      - /mnt/apexp/pharma-monitor/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - traefik-public
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # Loki - Logs Storage
  # ========================
  apexp-loki:
    image: grafana/loki:2.9.0
    ports:
      - ":3100"
    command:
      - -config.file=/etc/loki/loki-config.yaml
    volumes:
      - /mnt/apexp/pharma-monitor/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================
  # Promtail - Log Collector
  # ========================
  apexp-promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /mnt/apexp/pharma-monitor/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /mnt/apexp/logs:/var/log
      # 👇 VERY IMPORTANT (for docker logs)
      #- /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yaml
    networks:
      - traefik-public
    depends_on:
      - apexp-loki
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ========================
  # Grafana - Visualization
  # ========================
  apexp-grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Deep@Fathom2001
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - ":3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /mnt/apexp/pharma-monitor/grafana/datasources:/etc/grafana/provisioning/datasources
      - /mnt/apexp/pharma-monitor/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - traefik-public
    depends_on:
      - apexp-prometheus
      - apexp-loki
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      labels:
        - "traefik.enable=true"
        - traefik.http.routers.apexp-grafana.rule=Host(`monitor.apexp.bizmotionapp.com`)
        - "traefik.http.services.apexp-grafana.loadbalancer.server.port=3000"
        - "traefik.http.routers.apexp-grafana.entrypoints=web,websecure"
        - "traefik.http.routers.apexp-grafana.tls=true"
        - "traefik.http.routers.apexp-grafana.tls.certresolver=leresolver"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  traefik-public:
    external: true
#    driver: bridge

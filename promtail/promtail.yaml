server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://apexp-loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 102400    # 100KB per batch to reduce pressure on Loki
    timeout: 30s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels: {}
    tenant_id: ""

scrape_configs:

  # ========================
  # Docker container logs
  # ========================
#  - job_name: docker
#    static_configs:
#      - targets:
#          - localhost
#        labels:
#          job: docker-logs
#          __path__: /var/lib/docker/containers/*/*.log

  # ========================
  # Spring Boot file logs
  # ========================
  - job_name: file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: file-logs
          __path__: /var/log/files/*.log

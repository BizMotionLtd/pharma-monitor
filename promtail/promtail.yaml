server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://p2-loki:3100/loki/api/v1/push
    batchwait: 500ms     # Send more frequently
    batchsize: 51200     # 50KB per batch to reduce pressure on Loki
    timeout: 60s         # Increase timeout to handle spikes
    backoff_config:
      min_period: 1s
      max_period: 5m
      max_retries: 10
    external_labels: {}
    tenant_id: ""

scrape_configs:

  # ========================
  # Docker container logs
  # ========================
#  - job_name: docker
#    static_configs:
#      - targets:
#          - localhost
#        labels:
#          job: docker-logs
#          __path__: /var/lib/docker/containers/*/*.log

  # ========================
  # Spring Boot file logs
  # ========================
  - job_name: file-logs
    pipeline_stages:
      - regex:
          expression: '^(?P<time>[^|]+) \| (?P<level>[^|]+) \| \[(?P<service>[^\]]+)\] \| (?P<msg>.*)'
      - labels:
          level:
          service:
    static_configs:
      - targets:
          - localhost
        labels:
          job: file-logs
          __path__: /var/log/files/*.log

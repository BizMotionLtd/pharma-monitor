global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'pharma-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'pharma-sfa'
    metrics_path: '/pharmaws/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: http
    static_configs:
      - targets: [ 'pharma2-gateway:8080' ]
        labels:
          service: 'pharma-sfa'
          environment: 'development'

  - job_name: 'pharma-dms'
    metrics_path: '/dms/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: http
    static_configs:
      - targets: ['pharma2-gateway:8080']
        labels:
          service: 'pharma-dms'
          environment: 'development'


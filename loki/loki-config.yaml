auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  http_server_read_timeout: 600s
  http_server_write_timeout: 600s
  http_server_idle_timeout: 120s
  grpc_server_max_recv_msg_size: 104857600  # 100MB
  grpc_server_max_send_msg_size: 104857600  # 100MB
  grpc_server_max_concurrent_streams: 1000

target: all                          # 👈 explicit single-binary mode

querier:
  max_concurrent: 4
  query_timeout: 1m
  tail_max_duration: 1h
  extra_query_delay: 0s
  query_ingesters_within: 3h
  engine:
    timeout: 5m
    max_look_back_period: 30s

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1
    instance_port: 9095
    instance_id: loki-1

memberlist:
  join_members: []
  dead_node_reclaim_time: 30s
  gossip_to_dead_nodes_time: 0s
  left_ingesters_timeout: 30s
  bind_port: 7946
  advertise_port: 7946

distributor:
  ring:
    kvstore:
      store: inmemory

ingester_client:
  grpc_client_config:
    max_recv_msg_size: 104857600  # 100MB
    max_send_msg_size: 104857600  # 100MB
  remote_timeout: 1s

# Query scheduler and frontend worker disabled for single-binary mode
# querier:
#   max_concurrent: 4

# frontend:
#   address: "0.0.0.0"
#   max_outstanding_per_tenant: 256

# frontend_worker:
#   frontend_address: "127.0.0.1:9095"
#   grpc_client_config:
#     max_send_msg_size: 104857600

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
  filesystem:
    directory: /loki/chunks

limits_config:
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64
  per_stream_rate_limit: 10MB
  per_stream_rate_limit_burst: 20MB
  max_streams_per_user: 0
  max_global_streams_per_user: 0
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 721h
  max_query_parallelism: 32
  max_entries_limit_per_query: 10000
  max_label_value_length: 2048
  max_label_names_per_series: 30

ingester:
  chunk_idle_period: 30m      # Reduced from 1h for faster flushing
  max_chunk_age: 1h           # Reduced from 2h
  chunk_target_size: 1536000
  chunk_retain_period: 30s
  max_transfer_retries: 0
  concurrent_flushes: 16      # Increase parallelism for flushing
  lifecycler:
    address: 127.0.0.1
    port: 9095
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  wal:
    enabled: true
    dir: /loki/wal
    checkpoint_duration: 5m
    flush_on_shutdown: true
    replay_memory_ceiling: 1GB

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  retention_deletes_enabled: true
  retention_period: 168h
